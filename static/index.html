<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>CRM Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1 id="businessName">Dashboard</h1>
  </header>

  <div class="app-body">

    <!-- Mobile bottom nav (hidden on desktop) -->
    <nav class="nav">
      <button class="nav-btn active" data-page="inbox" onclick="showPage('inbox', this)">
        <span class="icon">📥</span>
        <span>Inbox</span>
        <span class="nav-badge" id="inboxBadge" style="display:none"></span>
      </button>
      <button class="nav-btn" data-page="chat" onclick="showPage('chat', this)">
        <span class="icon">💬</span>
        <span>Ask AI</span>
      </button>
      <button class="nav-btn" data-page="crm" onclick="showPage('crm', this)">
        <span class="icon">👥</span>
        <span>Contacts</span>
      </button>
    </nav>

    <!-- Main: on mobile = single page, on desktop = 3 columns -->
    <main class="main">

      <!-- ── INBOX ── -->
      <section class="page active" id="page-inbox">
        <div class="col-title">
          📥 Inbox
          <span class="col-badge" id="inboxColBadge" style="display:none"></span>
        </div>
        <div class="col-body">
          <div id="approvalList"></div>
        </div>
        <!-- Panel: slide-up on mobile, contained within column on desktop -->
        <div class="panel-overlay" id="approvalOverlay" onclick="closePanel('approval')"></div>
        <div class="panel" id="approvalPanel">
          <div class="panel-handle"></div>
          <button class="panel-close" onclick="closePanel('approval')">✕</button>
          <div class="panel-scroll" id="approvalPanelContent"></div>
          <div class="btn-row" id="approvalActions"></div>
        </div>
      </section>

      <!-- ── CHAT ── -->
      <section class="page" id="page-chat">
        <div class="col-title">💬 Ask AI</div>
        <div class="col-body chat-col-body">
          <div class="chat-messages" id="chatMessages"></div>
        </div>
        <div class="quick-questions">
          <button class="quick-q" onclick="quickAsk(this)">Any urgent matters?</button>
          <button class="quick-q" onclick="quickAsk(this)">Who needs follow-up?</button>
          <button class="quick-q" onclick="quickAsk(this)">Today's schedule</button>
          <button class="quick-q" onclick="quickAsk(this)">Stock levels</button>
          <button class="quick-q" onclick="quickAsk(this)">Recent leads</button>
          <button class="quick-q" onclick="quickAsk(this)">Overdue clients</button>
        </div>
        <div class="chat-input-row" id="chatInputRow">
          <input class="chat-input" id="chatInput" type="text"
                 placeholder="Ask anything about the business…" autocomplete="off">
          <button class="chat-send" id="chatSend" onclick="sendChat()">↑</button>
        </div>
      </section>

      <!-- ── CRM ── -->
      <section class="page" id="page-crm">
        <div class="col-title">👥 Contacts</div>
        <div class="col-body">
          <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="crmSearch" placeholder="Search contacts…" autocomplete="off">
          </div>
          <div class="filter-row" id="filterRow">
            <!-- populated dynamically from /api/meta -->
          </div>
          <div id="contactList"></div>
        </div>
        <!-- Panel: slide-up on mobile, contained within column on desktop -->
        <div class="panel-overlay" id="contactOverlay" onclick="closePanel('contact')"></div>
        <div class="panel" id="contactPanel">
          <div class="panel-handle"></div>
          <button class="panel-close" onclick="closePanel('contact')">✕</button>
          <div class="panel-scroll" id="contactPanelContent"></div>
        </div>
      </section>

    </main>
  </div><!-- /.app-body -->

</div><!-- /#app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
